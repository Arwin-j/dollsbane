<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dollsbane - Game Boy Shell</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="gameboy">
    <div class="top-bar">
      <div class="led-wrap">
        <div class="led"></div>
      </div>
    </div>

    <div class="screen-housing">
      <div class="screen-label">· GAME BOY ·</div>
      <div class="screen-bezel">

        <div class="screen-wrap">
          <div id="game-canvas"></div>

          <div id="menu-overlay">
            <button class="menu-btn btn-start">START</button>
            <button class="menu-btn btn-settings">SETTINGS</button>
            <button class="menu-btn btn-credits">CREDITS</button>
            <button class="menu-btn btn-exit">EXIT</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="scenes/GameScene.js"></script>
  <script src="scenes/LevelOneScene.js"></script>

  <script>
    new Phaser.Game({
      type: Phaser.AUTO,
      parent: 'game-canvas',
      backgroundColor: '#0f380f',
      banner: false,
      physics: {
        default: 'arcade',
        arcade: { gravity: { y: 500 }, debug: false }
      },
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 600,
        height: 600
      },
      scene: [GameScene, LevelOneScene]
    });
  </script>

  <style>
    .screen-wrap {
  position: relative;
  display: inline-block;
  width: 100%;
}

#menu-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  pointer-events: none;
}

#menu-overlay button {
  pointer-events: all;
  background: transparent;
  border: 2px solid #ffffff44;
  color: #ffffff;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 10px 28px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: background 0.15s, border-color 0.15s;
  outline: none;
  width: 180px;
  text-align: center;
}

#menu-overlay button:hover,
#menu-overlay button:focus {
  background: rgba(255, 255, 255, 0.12);
  border-color: #ffffff;
}
  </style>

  

</body>
</html>
